name: Tests

# Three jobs:
#   1. unit-and-api-tests  — the fast suite, run against SQLite (no external
#      services needed). This is what proves day-to-day application behavior.
#   2. postgres-migrations — stands up a REAL PostgreSQL service container,
#      applies the Alembic migrations against it, runs the migration
#      validation script, and runs the PostgreSQL-only tests (JSONB, native
#      ENUMs, partial unique index, CHECK constraints, UUID) that SQLite
#      cannot faithfully exercise.
#   3. celery-smoke — stands up REAL PostgreSQL + Redis services, starts a
#      real FastAPI process and a real Celery worker, then drives /process-async
#      through scripts/celery_smoke_test.py. Still mock inference only.
#
# No deployment step, no Docker image build, and no secrets are used. The
# PostgreSQL credentials below are throwaway values for an ephemeral CI
# database, not real secrets.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-and-api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run the full test suite (SQLite)
        # DATABASE_URL is intentionally NOT set here, so the PostgreSQL-only
        # tests auto-skip (they are validated in the postgres-migrations job).
        run: pytest -v

  postgres-migrations:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: blueberry
          POSTGRES_PASSWORD: blueberry
          POSTGRES_DB: blueberry_microid_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U blueberry -d blueberry_microid_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg://blueberry:blueberry@localhost:5432/blueberry_microid_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Validate Alembic migrations against real PostgreSQL
        # Connects, runs `alembic upgrade head`, and verifies the migrations
        # are reversible (downgrade base -> upgrade head). Exits non-zero on
        # any failure — see scripts/check_postgres_migrations.py.
        run: python scripts/check_postgres_migrations.py

      - name: Run PostgreSQL-specific tests
        run: |
          set +e
          pytest -v -m postgres tests/integration/postgres > pg_test_output.log 2>&1
          exit_code=$?
          if [ $exit_code -ne 0 ]; then
            cat pg_test_output.log
            echo "=== TEMPORARY CI DEBUG: emitting failure lines as annotations ==="
            grep -E "FAILED|Error|assert|^E " pg_test_output.log | tail -n 40 | while IFS= read -r line; do
              echo "::error::${line}"
            done
          fi
          exit $exit_code

  celery-smoke:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: blueberry
          POSTGRES_PASSWORD: blueberry
          POSTGRES_DB: blueberry_microid_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U blueberry -d blueberry_microid_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg://blueberry:blueberry@localhost:5432/blueberry_microid_test
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/1
      CELERY_TASK_ALWAYS_EAGER: "false"
      CELERY_TASK_EAGER_PROPAGATES: "true"
      API_BASE_URL: http://127.0.0.1:8000
      STORAGE_ROOT: /tmp/blueberry-storage

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Apply Alembic migrations
        run: alembic upgrade head

      - name: Start Celery worker
        run: |
          python -m celery -A blueberry_microid.infrastructure.tasks.celery_app.celery_app worker --loglevel=info -Q analysis --pool=solo > celery-worker.log 2>&1 &
          echo $! > celery-worker.pid
          sleep 5

      - name: Start API
        run: |
          python -m uvicorn blueberry_microid.interfaces.api.app:create_app --factory --host 127.0.0.1 --port 8000 > api.log 2>&1 &
          echo $! > api.pid
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/health; then
              exit 0
            fi
            sleep 1
          done
          cat api.log
          exit 1

      - name: Run real Celery Redis smoke
        run: python scripts/celery_smoke_test.py

      - name: Show service logs on failure
        if: failure()
        run: |
          echo "===== API LOG ====="
          cat api.log || true
          echo "===== CELERY WORKER LOG ====="
          cat celery-worker.log || true
