name: Tests

# Minimal CI: install the project and run the test suite against SQLite
# (see tests/*/conftest.py). This does NOT validate against a real
# PostgreSQL instance — that remains a separate, manual step
# (`docker compose up -d` + `python scripts/check_postgres_migrations.py`),
# documented as pending in docs/development.md. No deployment step and no
# secrets are used here.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest -v
