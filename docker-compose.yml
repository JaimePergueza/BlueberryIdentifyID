services:
  postgres:
    image: postgres:16-alpine
    container_name: blueberry_microid_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-blueberry}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-blueberry}
      POSTGRES_DB: ${POSTGRES_DB:-blueberry_microid}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - blueberry_microid_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-blueberry} -d ${POSTGRES_DB:-blueberry_microid}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Not used by any code yet — reserved for the future Celery-based
  # asynchronous inference pipeline (Fase 4+). Included now so the compose
  # topology doesn't need to change when that phase starts.
  redis:
    image: redis:7-alpine
    container_name: blueberry_microid_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"

volumes:
  blueberry_microid_postgres_data:
